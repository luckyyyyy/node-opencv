name: Release

# Triggered by version tags (e.g. v1.0.0) only — not on every main push.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ── Build prebuilt binaries for each platform ─────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            node-file: node-opencv-rs.linux-x64-gnu.node

          - target: aarch64-apple-darwin
            os: macos-latest
            node-file: node-opencv-rs.darwin-arm64.node

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            node-file: node-opencv-rs.win32-x64-msvc.node

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopencv-dev llvm clang libclang-dev
          echo "LIBCLANG_PATH=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Miniforge for macOS
        if: matrix.os == 'macos-latest'
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: build
          channels: conda-forge

      - name: Install OpenCV 4.11.0 via conda (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash -el {0}
        run: |
          conda install -y opencv=4.11.0 libclang pkg-config

      - name: Set macOS build environment variables
        if: matrix.os == 'macos-latest'
        shell: bash -el {0}
        run: |
          echo "PKG_CONFIG_PATH=$CONDA_PREFIX/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$CONDA_PREFIX/lib" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$CONDA_PREFIX/lib" >> "$GITHUB_ENV"
          echo "CONDA_PREFIX_SAVED=$CONDA_PREFIX" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe"
          Invoke-WebRequest -Uri $url -OutFile "opencv.exe" -TimeoutSec 600
          Start-Process -FilePath "opencv.exe" -ArgumentList "-y -o`"D:`"" -Wait
          echo "OPENCV_INCLUDE_PATHS=D:\opencv\build\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENCV_LINK_LIBS=opencv_world4100" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENCV_LINK_PATHS=D:\opencv\build\x64\vc16\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "D:\opencv\build\x64\vc16\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build (release)
        run: npm run build

      - name: Smoke test
        run: |
          DYLD_FALLBACK_LIBRARY_PATH="${CONDA_PREFIX_SAVED:-}/lib" \
            node -e "const cv = require('.'); if (typeof cv.Mat !== 'function') process.exit(1); console.log('Mat OK');"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.node-file }}
          path: ${{ matrix.node-file }}
          if-no-files-found: error
          retention-days: 1

  # ── Publish to npm after all binaries are built ───────────────────────────
  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm dependencies (no build)
        run: npm install --ignore-scripts

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: .

      - name: List downloaded artifacts
        run: ls -la *.node

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: '*.node'

      - name: Publish to npm
        run: npm publish --ignore-scripts --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
